<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme color for browser chrome (improves perceived performance) -->
    <meta name="theme-color" content="#1e40af" />

    <!-- Primary Meta -->
    <title>Clad-Primeco | Cladding &amp; Roofing Specialists — Dublin, Ireland</title>
    <meta name="description" content="Clad-Primeco — Professional cladding, roofing and architectural panel solutions based in Dublin, Ireland. Explore our expertise and product range for commercial and residential construction." />
    <meta name="keywords" content="cladding Ireland, roofing Dublin, architectural panels, construction panels, aluminium cladding, Kingspan panels, building facade Ireland" />
    <meta name="author" content="Clad-Primeco Ltd" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cladprimeco.ie" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Clad-Primeco" />
    <meta property="og:title" content="Clad-Primeco | Cladding &amp; Roofing Specialists — Dublin, Ireland" />
    <meta property="og:description" content="Professional cladding, roofing and architectural panel solutions based in Dublin, Ireland." />
    <meta property="og:url" content="https://cladprimeco.ie" />
    <meta property="og:image" content="https://cladprimeco.ie/images/og-image.jpg" />
    <meta property="og:locale" content="en_IE" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/logo/favicon.png" />

    <!--
      PERFORMANCE: Preconnect to third-party origins.
      preconnect = DNS + TCP + TLS handshake done early.
      crossorigin required for CORS assets (fonts, scripts from CDN).
    -->
    <link rel="preconnect" href="https://tyhqyfufzzoszafqnekf.supabase.co" />
    <link rel="preconnect" href="https://hcaptcha.com" />
    <link rel="preconnect" href="https://newassets.hcaptcha.com" crossorigin />
    <link rel="preconnect" href="https://js.hcaptcha.com" crossorigin />

    <!--
      DNS-prefetch as fallback for browsers that don't support preconnect,
      and for additional third-party hosts that may be hit later.
    -->
    <link rel="dns-prefetch" href="https://www.instagram.com" />
    <link rel="dns-prefetch" href="https://js.hcaptcha.com" />

    <!--
      LCP OPTIMISATION: Preload the first hero background image.
      This is the Largest Contentful Paint element — loaded via CSS background-image
      so the browser cannot discover it from HTML. Preloading it explicitly
      reduces LCP by 600-1200ms on typical connections.

      as="image" + imagesrcset is not needed here because this is a full-screen
      background served at a single URL. The fetchpriority=high hint tells the
      browser to treat this fetch as high-priority alongside render-blocking resources.
    -->
    <link
      rel="preload"
      as="image"
      href="/images/backgrounds/kingspan-panel.jpg"
      fetchpriority="high"
    />

    <!--
      Preload the logo — it appears in the LCP window and is above the fold.
      Mobile first: preload the mobile variant which loads on all viewports.
    -->
    <link
      rel="preload"
      as="image"
      href="/images/logo/logo-mobile.png"
    />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Clad-Primeco",
      "description": "Professional cladding, roofing and architectural panel solutions based in Dublin, Ireland.",
      "url": "https://cladprimeco.ie",
      "telephone": "+353833469813",
      "email": "cladprimeco@outlook.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dublin",
        "addressCountry": "IE"
      },
      "areaServed": [
        { "@type": "City", "name": "Dublin" },
        { "@type": "City", "name": "Cork" },
        { "@type": "City", "name": "Limerick" },
        { "@type": "City", "name": "Galway" },
        { "@type": "City", "name": "Waterford" },
        { "@type": "City", "name": "Kilkenny" },
        { "@type": "City", "name": "Drogheda" },
        { "@type": "Country", "name": "Ireland" }
      ],
      "serviceType": ["Cladding", "Roofing", "Architectural Panels", "Construction Panels"],
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
        "opens": "08:00",
        "closes": "17:00"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
